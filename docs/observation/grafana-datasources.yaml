apiVersion: 1

datasources:
  # Grafana Tempo — Traces
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      traceToLogsV2:
        datasourceUid: ""
      traceToMetrics:
        datasourceUid: prometheus
        queries:
          - name: "Request rate"
            query: 'sum(rate(bloomai_http_request_duration_ms_count{$$__tags}[5m]))'

  # Prometheus — Metrics
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    uid: prometheus
    jsonData:
      httpMethod: POST
      timeInterval: 15s
